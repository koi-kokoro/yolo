# ==============================================================================
# Alembic migration configuration
# Keep this file ASCII-only. Alembic may read .ini files with the Windows locale
# encoding, which can fail on UTF-8 Chinese comments.
# ==============================================================================

[alembic]

# Path to migration scripts, relative to this file.
script_location = alembic

# Add backend/ to sys.path so alembic/env.py can import app modules.
prepend_sys_path = .

# Use the operating system path separator for version_locations.
version_path_separator = os

# Fallback URL. alembic/env.py overrides this with settings.DATABASE_URL so
# migrations use the same .env-driven database as the application.
sqlalchemy.url = postgresql://lee_admin:lee_admin@localhost:5432/lee_agent


[post_write_hooks]


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = DEBUG
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
